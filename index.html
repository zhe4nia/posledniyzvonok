<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Последний звонок</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(-45deg, #a8e6cf, #dcedc1, #ffd3b6, #ffaaa5, #87ceeb);
            background-size: 400% 400%;
            animation: springGradient 15s ease infinite;
            color: #333;
            text-align: center;
            overflow-x: hidden;
        }

        @keyframes springGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 85%;
            max-width: 600px;
            margin: 20px;
        }

        .typewriter-container {
            min-height: 80px; /* Увеличил, чтобы фразы в 2 строки на мобилках не дергали экран */
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #222;
            margin: 0;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.4rem;
            background: #222;
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #timer {
            /* Гибкий размер: минимум 2.5rem, максимум 4.5rem */
            font-size: clamp(2.5rem, 10vw, 4.5rem); 
            font-weight: 900;
            margin: 15px 0 5px 0;
            color: #000;
            letter-spacing: -1px;
            white-space: nowrap; /* Чтобы не разрывался на две строки */
        }

        .units {
            font-size: 0.7rem;
            display: flex;
            justify-content: space-around;
            opacity: 0.6;
            font-weight: 900;
            color: #000;
            letter-spacing: 1px;
        }

        .exact-time {
            font-size: 0.9rem;
            margin-top: 30px;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 20px;
        }

        /* Адаптация для маленьких экранов (телефонов) */
        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 15px;
            }
            h1 {
                font-size: 1.1rem;
            }
            .units {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="typewriter-container">
            <h1 id="typewriter"></h1><span class="cursor"></span>
        </div>
        
        <div id="timer">00:00:00:00</div>
        
        <div class="units">
            <span>ДНИ</span>
            <span>ЧАСЫ</span>
            <span>МИН</span>
            <span>СЕК</span>
        </div>

        <div class="exact-time">
            [ 26.05.2026 — 11:00 МСК ]
        </div>
    </div>

    <script>
        const targetDate = new Date("May 26, 2026 11:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("timer").innerHTML = "00:00:00:00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            const d = days.toString().padStart(2, '0');
            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById("timer").innerHTML = `${d}:${h}:${m}:${s}`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        const textElement = document.getElementById('typewriter');
        const phrases = [
            "Вас ожидает кое-что особенное...",
            "Событие, которое нельзя пропустить",
            "До момента X осталось:",
            "Встречаемся на главной линейке года",
            "История начинается здесь...",
            "Станьте свидетелем нашего финала",
            "Мы подготовили для вас лучшее",
            "Время летит, но моменты остаются",
            "Ваше место в зале уже забронировано",
            "Приготовьтесь к теплым эмоциям!"
        ];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 100;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
                typeSpeed = 40;
            } else {
                textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
                typeSpeed = 80;
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                typeSpeed = 3000; 
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 400;
            }

            setTimeout(type, typeSpeed);
        }
        type();
    </script>
</body>
</html>
