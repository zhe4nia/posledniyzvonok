<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Bell Loading...</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            padding: 20px;
            border: 2px solid #fff;
            position: relative;
        }

        h1 { font-size: 1.5rem; letter-spacing: 2px; }

        /* Прогресс-бар */
        .progress-container {
            width: 300px;
            height: 20px;
            border: 1px solid #fff;
            margin: 20px 0;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            /* Цвет RGB, который мы выбрали (Электрик) */
            background-color: rgb(47, 0, 255); 
            width: 0%; /* Меняется через JS */
            transition: width 1s ease-in-out;
        }

        .status { font-size: 0.8rem; margin-top: 10px; color: #888; }
        
        #timer { font-size: 2rem; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div>System Status: Loading Future...</div>
        <div id="timer">00:00:00:00</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
        
        <div class="status" id="percent">DOWNLOAD: 0%</div>
    </div>

    <script>
        // УСТАНОВИ СВОЮ ДАТУ ТУТ (Год, Месяц - 1, Число)
        // Месяцы считаются от 0 (Январь - 0, Май - 4)
        const targetDate = new Date(2026, 4, 23, 10, 0, 0).getTime();

        // Дата начала отсчета (например, 1 сентября прошлого года), чтобы считать %
        const startDate = new Date(2025, 8, 1).getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Расчет времени
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Вывод таймера
            document.getElementById("timer").innerHTML = 
                `${days}D:${hours}H:${minutes}M:${seconds}S`;

            // Расчет прогресса
            const totalDuration = targetDate - startDate;
            const timePassed = now - startDate;
            let progress = (timePassed / totalDuration) * 100;
            
            if (progress > 99.9) progress = 99.9; // Оставляем эффект "почти готово"
            if (distance < 0) {
                progress = 100;
                document.getElementById("timer").innerHTML = "FINISH";
            }

            document.getElementById("bar").style.width = progress + "%";
            document.getElementById("percent").innerHTML = `DOWNLOAD: ${progress.toFixed(1)}%`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
